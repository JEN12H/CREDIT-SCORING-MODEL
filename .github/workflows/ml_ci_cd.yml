name: ML CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        mkdir -p data models

    - name: Run Unit Tests
      run: pytest tests/ -v --tb=short

    - name: Run Data Pipeline
      run: |
        echo "Generating data..."
        python -m src.data.generate_customers
        python -m src.data.generate_behavior

        echo "Running feature engineering..."
        python -m src.data.feature_pipeline

    - name: Train & Validate Models
      run: python -m src.training.train

    - name: Run Model Evaluation
      run: python -m src.training.evaluate

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: |
          models/*.pkl
          *.png
          test_predictions.csv
          cold_start_training.log
